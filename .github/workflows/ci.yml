name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t devops-lab-service:ci .

      - name: Run container for testing
        run: |
          docker run -d -p 8000:8000 --name test-app devops-lab-service:ci
          sleep 10
          curl --fail http://localhost:8000/ || (docker logs test-app && exit 1)
          curl --fail http://localhost:8000/metrics || (docker logs test-app && exit 1)

      - name: Clean up
        if: always()
        run: |
          docker stop test-app || true
          docker rm test-app || true
